name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository == 'willclarktech/morph'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            echo "pending=true" >> $GITHUB_OUTPUT
          else
            echo "pending=false" >> $GITHUB_OUTPUT
          fi

      - name: Version packages
        if: steps.changesets.outputs.pending == 'true'
        run: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync VSCode extension version
        if: steps.changesets.outputs.pending == 'true'
        run: |
          VERSION=$(jq -r .version contexts/generation/core/package.json)
          jq --indent 1 --arg v "$VERSION" '.version = $v' apps/vscode/package.json > tmp.json && mv tmp.json apps/vscode/package.json
          bunx prettier --write apps/vscode/package.json

      - name: Build packages
        if: steps.changesets.outputs.pending == 'true'
        run: bun run build

      - name: Commit version bumps
        if: steps.changesets.outputs.pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages" || true

      - name: Rewrite workspace deps
        if: steps.changesets.outputs.pending == 'true'
        run: bun scripts/rewrite-workspace-deps.ts

      - name: Publish to npm
        if: steps.changesets.outputs.pending == 'true'
        run: bunx changeset publish

      - name: Push tags and version bumps
        if: steps.changesets.outputs.pending == 'true'
        run: git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package VSCode extension
        if: steps.changesets.outputs.pending == 'true'
        run: cd apps/vscode && bun run package

      - name: Publish VSCode extension
        if: steps.changesets.outputs.pending == 'true'
        run: cd apps/vscode && bunx @vscode/vsce publish --no-dependencies -p $VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
